<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lumi</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1a1a2e">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lumi">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #242438;
  --accent: #c8a882;
  --accent2: #e8c9a0;
  --text: #f0ece4;
  --text-dim: rgba(240,236,228,0.45);
  --star: #f0c060;
  --radius: 22px;
  --safe-bottom: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'Lato', sans-serif; color: var(--text); display: flex; flex-direction: column; }

/* ── LAYOUT ── */
#main-container { flex: 1; position: relative; overflow: hidden; }

.view {
  position: absolute; inset: 0;
  transition: transform 0.42s cubic-bezier(0.4,0,0.2,1), opacity 0.42s ease;
  background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.view.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
.view.active  { transform: translateX(0);    opacity: 1; }

/* ── NAV ── */
.nav-bar {
  height: calc(68px + var(--safe-bottom));
  background: rgba(15,15,26,0.92);
  backdrop-filter: blur(18px);
  display: flex; justify-content: space-around; align-items: center;
  padding-bottom: var(--safe-bottom);
  border-top: 1px solid rgba(200,168,130,0.12);
  flex-shrink: 0; z-index: 100;
}
.nav-item {
  border: none; background: none;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 20px; cursor: pointer;
}
.nav-icon { font-size: 1.4rem; transition: transform 0.2s; }
.nav-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); transition: color 0.2s; }
.nav-item.active-nav .nav-icon { transform: scale(1.15); }
.nav-item.active-nav .nav-label { color: var(--accent); }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.92); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(-18px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes starPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.5); }
  70%  { transform: scale(0.88); }
  100% { transform: scale(1); }
}

.anim-fade-up   { animation: fadeUp  0.5s cubic-bezier(0.22,1,0.36,1) both; }
.anim-scale-in  { animation: scaleIn 0.55s cubic-bezier(0.22,1,0.36,1) both; }
.anim-fade-in   { animation: fadeIn  0.4s ease both; }
.anim-slide-r   { animation: slideRight 0.4s cubic-bezier(0.22,1,0.36,1) both; }

/* staggered delays for grid items */
.memory-item:nth-child(1)  { animation-delay: 0.04s; }
.memory-item:nth-child(2)  { animation-delay: 0.08s; }
.memory-item:nth-child(3)  { animation-delay: 0.12s; }
.memory-item:nth-child(4)  { animation-delay: 0.16s; }
.memory-item:nth-child(5)  { animation-delay: 0.20s; }
.memory-item:nth-child(6)  { animation-delay: 0.24s; }
.memory-item:nth-child(7)  { animation-delay: 0.28s; }
.memory-item:nth-child(8)  { animation-delay: 0.32s; }
.memory-item:nth-child(9)  { animation-delay: 0.36s; }
.memory-item:nth-child(n+10) { animation-delay: 0.40s; }

.starred-thumb:nth-child(1) { animation-delay: 0.05s; }
.starred-thumb:nth-child(2) { animation-delay: 0.10s; }
.starred-thumb:nth-child(3) { animation-delay: 0.15s; }
.starred-thumb:nth-child(4) { animation-delay: 0.20s; }
.starred-thumb:nth-child(n+5) { animation-delay: 0.25s; }

.star-pop { animation: starPop 0.35s cubic-bezier(0.22,1,0.36,1); }

/* ── HOME ── */
#home-view { padding: 0 0 30px 0; }

.home-header {
  padding: 52px 24px 20px;
  display: flex; justify-content: space-between; align-items: flex-end;
}
.home-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--text); }
.home-title span { color: var(--accent); font-style: italic; }
.home-subtitle { font-size: 0.75rem; font-weight: 300; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.04em; }
.header-date { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); text-align: right; }

/* hero widget */
.hero-wrap {
  padding: 0 20px 24px;
}
.hero-card {
  width: 100%; aspect-ratio: 1/1;
  max-height: 55vw;
  border-radius: 28px;
  overflow: hidden;
  background: var(--surface2);
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,168,130,0.1);
}
.hero-card img, .hero-card video { width: 100%; height: 100%; object-fit: cover; }
.hero-empty {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
}
.hero-empty-icon { font-size: 2.8rem; opacity: 0.3; }
.hero-empty-text { font-size: 0.8rem; color: var(--text-dim); font-weight: 300; letter-spacing: 0.05em; }

.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
  pointer-events: none;
}
.hero-meta {
  position: absolute; bottom: 14px; left: 18px; right: 18px;
  display: flex; justify-content: space-between; align-items: flex-end;
}
.hero-time { font-size: 0.75rem; color: rgba(255,255,255,0.7); font-weight: 300; }
.hero-caption { font-size: 1rem; font-family: 'Playfair Display', serif; color: white; margin-top: 2px; }
.hero-star-btn {
  background: rgba(0,0,0,0.35); border: none; border-radius: 50%;
  width: 36px; height: 36px; font-size: 1.1rem; cursor: pointer;
  backdrop-filter: blur(8px); transition: transform 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.hero-star-btn:active { transform: scale(1.3); }

/* section headers */
.section-header {
  padding: 4px 24px 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.section-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--text); }
.section-count { font-size: 0.7rem; color: var(--text-dim); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }

/* starred strip */
.starred-strip {
  display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 20px;
  scrollbar-width: none;
}
.starred-strip::-webkit-scrollbar { display: none; }
.starred-thumb {
  flex-shrink: 0; width: 80px; height: 80px;
  border-radius: 16px; overflow: hidden; background: var(--surface2);
  position: relative; cursor: pointer;
  border: 2px solid rgba(240,192,96,0.35);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  transition: transform 0.2s;
}
.starred-thumb:active { transform: scale(0.95); }
.starred-thumb img, .starred-thumb video { width: 100%; height: 100%; object-fit: cover; }
.starred-badge { position: absolute; top: 4px; right: 4px; font-size: 0.65rem; }
.starred-empty { font-size: 0.8rem; color: var(--text-dim); padding: 10px 0; font-weight: 300; }

/* memories grid */
.memories-section { padding: 0 20px; }
.memories-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  padding-bottom: 20px;
}
.memory-item {
  aspect-ratio: 1/1; border-radius: 14px; overflow: hidden;
  background: var(--surface2); position: relative; cursor: pointer;
  transition: transform 0.2s;
}
.memory-item:active { transform: scale(0.96); }
.memory-item img, .memory-item video { width: 100%; height: 100%; object-fit: cover; }
.memory-actions {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0); transition: background 0.2s;
  display: flex; flex-direction: column; justify-content: space-between; padding: 6px;
}
.memory-star {
  align-self: flex-end; font-size: 0.9rem; background: none; border: none; cursor: pointer;
  opacity: 0.7; transition: opacity 0.2s, transform 0.2s; line-height: 1;
}
.memory-star:active { transform: scale(1.4); opacity: 1; }
.memory-del {
  align-self: flex-end; background: rgba(0,0,0,0.4); color: white; border: none;
  border-radius: 50%; width: 20px; height: 20px; font-size: 0.65rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; line-height: 1;
}

/* ── SAVE MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.25s ease;
}
.modal-backdrop.hiding { animation: fadeIn 0.2s ease reverse; }
.modal-sheet {
  width: 100%; max-width: 480px;
  background: var(--surface);
  border-radius: 28px 28px 0 0;
  padding: 12px 24px calc(28px + var(--safe-bottom));
  border-top: 1px solid rgba(200,168,130,0.15);
  animation: slideUp 0.35s cubic-bezier(0.22,1,0.36,1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.modal-handle {
  width: 40px; height: 4px; border-radius: 2px;
  background: rgba(240,236,228,0.2); margin: 0 auto 20px;
}
.modal-preview {
  width: 100%; aspect-ratio: 1/1; border-radius: 18px;
  overflow: hidden; background: var(--surface2); margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.modal-preview img, .modal-preview video { width: 100%; height: 100%; object-fit: cover; }
.modal-title {
  font-family: 'Playfair Display', serif; font-size: 1.3rem;
  color: var(--text); margin-bottom: 6px; text-align: center;
}
.modal-sub {
  font-size: 0.75rem; color: var(--text-dim); text-align: center;
  margin-bottom: 24px; font-weight: 300; letter-spacing: 0.03em;
}
.modal-btns { display: flex; flex-direction: column; gap: 10px; }
.modal-btn {
  width: 100%; padding: 16px; border-radius: 16px; border: none;
  font-size: 0.95rem; font-weight: 700; cursor: pointer;
  letter-spacing: 0.03em; transition: transform 0.15s, opacity 0.15s;
}
.modal-btn:active { transform: scale(0.97); opacity: 0.85; }
.modal-btn-primary {
  background: var(--accent); color: var(--bg);
}
.modal-btn-secondary {
  background: var(--surface2); color: var(--text);
}
.modal-btn-ghost {
  background: transparent; color: var(--text-dim); font-weight: 400;
}

/* ── CAMERA VIEW ── */
#camera-view { background: #000; padding: 0; overflow: hidden; }
#video-preview { width: 100%; height: 100%; object-fit: cover; }
.flip-btn {
  position: absolute; top: 52px; right: 20px;
  background: rgba(255,255,255,0.15); border: none; border-radius: 50%;
  width: 44px; height: 44px; color: white; font-size: 1.1rem;
  backdrop-filter: blur(8px); cursor: pointer; z-index: 10;
  display: flex; align-items: center; justify-content: center;
}
.camera-controls {
  position: absolute; bottom: calc(36px + var(--safe-bottom));
  width: 100%; display: flex; flex-direction: column; align-items: center; gap: 22px;
}
.mode-pill {
  background: rgba(0,0,0,0.45); backdrop-filter: blur(10px);
  padding: 5px 16px; border-radius: 20px;
  font-size: 0.65rem; font-weight: 800; letter-spacing: 0.12em; color: var(--accent2);
}
.capture-btn {
  width: 78px; height: 78px; border-radius: 50%;
  border: 5px solid rgba(255,255,255,0.85); background: transparent;
  position: relative; cursor: pointer; transition: transform 0.15s;
}
.capture-btn::after {
  content: ''; position: absolute; inset: 7px;
  background: white; border-radius: 50%; transition: border-radius 0.2s, transform 0.2s, background 0.2s;
}
.capture-btn.recording::after { background: #ff4444; border-radius: 8px; transform: scale(0.6); }
.capture-btn:active { transform: scale(0.93); }
.cam-secondary { display: flex; gap: 40px; }
.cam-btn {
  background: rgba(255,255,255,0.12); border: none; color: white;
  font-size: 0.8rem; font-weight: 700; letter-spacing: 0.05em; padding: 8px 18px;
  border-radius: 20px; backdrop-filter: blur(8px); cursor: pointer;
}
</style>
</head>

<body>

<div id="main-container">

  <!-- HOME -->
  <div id="home-view" class="view active">

    <div class="home-header">
      <div>
        <div class="home-title">Lu<span>mi</span></div>
        <div class="home-subtitle">your little moments</div>
      </div>
      <div class="header-date" id="header-date"></div>
    </div>

    <!-- Hero -->
    <div class="hero-wrap">
      <div class="hero-card" id="hero-card">
        <div class="hero-empty">
          <div class="hero-empty-icon">✦</div>
          <div class="hero-empty-text">No moments yet</div>
        </div>
      </div>
    </div>

    <!-- Starred -->
    <div class="section-header">
      <div class="section-title">⭐ Starred</div>
      <div class="section-count" id="star-count">0 photos</div>
    </div>
    <div class="starred-strip" id="starred-strip">
      <div class="starred-empty">Star your favourite moments to pin them here.</div>
    </div>

    <!-- All Memories -->
    <div class="section-header">
      <div class="section-title">All Memories</div>
      <div class="section-count" id="all-count">0 photos</div>
    </div>
    <div class="memories-section">
      <div class="memories-grid" id="history-grid"></div>
    </div>

  </div>

  <!-- CAMERA -->
  <div id="camera-view" class="view hidden">
    <video id="video-preview" autoplay playsinline muted></video>
    <button class="flip-btn" onclick="flipCamera()">🔄</button>
    <div class="camera-controls">
      <div class="mode-pill" id="mode-status">PHOTO MODE</div>
      <button class="capture-btn" id="capture-trigger"></button>
      <div class="cam-secondary">
        <button class="cam-btn" onclick="toggleMode()">🎥 Video</button>
        <button class="cam-btn" onclick="document.getElementById('up').click()">📂 Upload</button>
      </div>
      <input type="file" id="up" style="display:none" accept="image/*,video/*">
    </div>
  </div>

</div>

<nav class="nav-bar">
  <button class="nav-item active-nav" id="nav-home" onclick="showView('home')">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Home</span>
  </button>
  <button class="nav-item" id="nav-camera" onclick="showView('camera')">
    <span class="nav-icon">📸</span>
    <span class="nav-label">Capture</span>
  </button>
</nav>

<script>
let db, stream, recorder, chunks = [], currentMode = 'photo', useFrontCamera = true;

// Date header
const d = new Date();
document.getElementById('header-date').textContent =
  d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }).toUpperCase();

// DB
const req = indexedDB.open("LumiDB_v2", 1);
req.onupgradeneeded = e => {
  const db = e.target.result;
  if (!db.objectStoreNames.contains("moments"))
    db.createObjectStore("moments", { keyPath: "id", autoIncrement: true });
};
req.onsuccess = e => { db = e.target.result; renderGallery(); };

function showView(id) {
  document.querySelectorAll('.view').forEach(v => { v.classList.add('hidden'); v.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
  document.getElementById(id + '-view').classList.replace('hidden','active');
  document.getElementById('nav-' + id).classList.add('active-nav');
  if (id === 'camera') startCamera();
  else { stopCamera(); renderGallery(); }
}

async function startCamera() {
  if (stream) stopCamera();
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: useFrontCamera ? 'user' : 'environment' }, audio: true
    });
    const v = document.getElementById('video-preview');
    v.srcObject = stream;
    v.style.transform = useFrontCamera ? 'scaleX(-1)' : 'scaleX(1)';
  } catch { alert("Camera requires HTTPS or permission."); }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function flipCamera() { useFrontCamera = !useFrontCamera; startCamera(); }

function toggleMode() {
  currentMode = currentMode === 'photo' ? 'video' : 'photo';
  document.getElementById('mode-status').textContent = currentMode.toUpperCase() + ' MODE';
}

const trigger = document.getElementById('capture-trigger');
trigger.onclick = () => { if (currentMode === 'photo') takePhoto(); };
let pressTimer;
trigger.onpointerdown = () => { if (currentMode === 'video') pressTimer = setTimeout(startRecording, 150); };
trigger.onpointerup   = () => { if (currentMode === 'video') { clearTimeout(pressTimer); stopRecording(); } };

function takePhoto() {
  const v = document.getElementById('video-preview');
  const c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  const ctx = c.getContext('2d');
  if (useFrontCamera) { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
  ctx.drawImage(v, 0, 0);
  c.toBlob(blob => saveMoment(blob, 'image/jpeg'), 'image/jpeg', 0.92);
}

function startRecording() {
  chunks = [];
  recorder = new MediaRecorder(stream);
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => saveMoment(new Blob(chunks, { type: 'video/mp4' }), 'video/mp4');
  recorder.start();
  trigger.classList.add('recording');
}

function stopRecording() {
  if (recorder && recorder.state !== 'inactive') { recorder.stop(); trigger.classList.remove('recording'); }
}

function saveMoment(blob, type) {
  const time = new Date().toLocaleString([], { hour: '2-digit', minute: '2-digit' });
  const tx = db.transaction("moments", "readwrite");
  tx.objectStore("moments").add({ blob, type, time, starred: false });
  tx.oncomplete = () => showSaveModal(blob, type);
}

function showSaveModal(blob, type) {
  const url = URL.createObjectURL(blob);

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-preview">
        ${type.includes('video')
          ? `<video src="${url}" autoplay loop muted playsinline></video>`
          : `<img src="${url}">`}
      </div>
      <div class="modal-title">Moment saved ✦</div>
      <div class="modal-sub">Would you also like to download it to your gallery?</div>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-primary" id="modal-dl">Download to Gallery</button>
        <button class="modal-btn modal-btn-secondary" id="modal-keep">Keep in Lumi Only</button>
      </div>
    </div>`;

  document.body.appendChild(backdrop);

  const close = () => {
    backdrop.classList.add('hiding');
    setTimeout(() => { backdrop.remove(); URL.revokeObjectURL(url); }, 200);
    showView('home');
  };

  backdrop.querySelector('#modal-dl').onclick = () => {
    const a = document.createElement('a');
    a.href = url;
    a.download = type.includes('video') ? 'lumi.mp4' : 'lumi.jpg';
    a.click();
    close();
  };

  backdrop.querySelector('#modal-keep').onclick = close;
  backdrop.addEventListener('click', e => { if (e.target === backdrop) close(); });
}

function renderGallery() {
  const grid   = document.getElementById('history-grid');
  const hero   = document.getElementById('hero-card');
  const strip  = document.getElementById('starred-strip');
  grid.innerHTML = ''; strip.innerHTML = '';

  let allItems = [];

  const tx = db.transaction("moments", "readonly").objectStore("moments");
  tx.openCursor(null, 'prev').onsuccess = e => {
    const cursor = e.target.result;
    if (cursor) { allItems.push(cursor.value); cursor.continue(); }
    else {
      // counts
      const starred = allItems.filter(i => i.starred);
      document.getElementById('all-count').textContent = allItems.length + ' item' + (allItems.length !== 1 ? 's' : '');
      document.getElementById('star-count').textContent = starred.length + ' item' + (starred.length !== 1 ? 's' : '');

      // hero
      if (allItems.length === 0) {
        hero.innerHTML = `<div class="hero-empty"><div class="hero-empty-icon">✦</div><div class="hero-empty-text">No moments yet</div></div>`;
      } else {
        renderHero(allItems[0]);
      }
      hero.style.animation = 'none';
      hero.offsetHeight; // reflow
      hero.style.animation = '';
      hero.classList.add('anim-scale-in');

      // section headers animate
      document.querySelectorAll('.section-header').forEach((el, i) => {
        el.style.opacity = '0';
        setTimeout(() => { el.style.opacity = ''; el.classList.add('anim-fade-up'); }, 150 + i * 80);
      });

      // starred strip
      if (starred.length === 0) {
        strip.innerHTML = '<div class="starred-empty">Star your favourite moments to pin them here.</div>';
      } else {
        starred.forEach(item => {
          const url = URL.createObjectURL(item.blob);
          const thumb = document.createElement('div');
          thumb.className = 'starred-thumb anim-fade-up';
          thumb.innerHTML = item.type.includes('video')
            ? `<video src="${url}" muted></video><span class="starred-badge">⭐</span>`
            : `<img src="${url}"><span class="starred-badge">⭐</span>`;
          thumb.onclick = () => renderHero(item);
          strip.appendChild(thumb);
        });
      }

      // grid
      allItems.forEach(item => {
        const url = URL.createObjectURL(item.blob);
        const div = document.createElement('div');
        div.className = 'memory-item anim-fade-up';
        const isStarred = item.starred;
        div.innerHTML = `
          ${item.type.includes('video') ? `<video src="${url}" muted></video>` : `<img src="${url}">`}
          <div class="memory-actions">
            <button class="memory-star" data-id="${item.id}">${isStarred ? '⭐' : '☆'}</button>
            <button class="memory-del" data-id="${item.id}">✕</button>
          </div>`;
        div.querySelector('.memory-star').onclick = ev => { ev.stopPropagation(); toggleStar(item.id, ev.currentTarget); };
        div.querySelector('.memory-del').onclick  = ev => { ev.stopPropagation(); delMoment(item.id); };
        div.onclick = () => renderHero(item);
        grid.appendChild(div);
      });
    }
  };
}

function renderHero(item) {
  const hero = document.getElementById('hero-card');
  const url = URL.createObjectURL(item.blob);
  hero.innerHTML = `
    ${item.type.includes('video')
      ? `<video src="${url}" autoplay loop muted playsinline></video>`
      : `<img src="${url}">`}
    <div class="hero-overlay"></div>
    <div class="hero-meta">
      <div>
        <div class="hero-time">${item.time}</div>
      </div>
      <button class="hero-star-btn" onclick="toggleStar(${item.id}, this)">${item.starred ? '⭐' : '☆'}</button>
    </div>`;
}

function toggleStar(id, btnEl) {
  if (btnEl) { btnEl.classList.remove('star-pop'); void btnEl.offsetWidth; btnEl.classList.add('star-pop'); }
  const tx = db.transaction("moments","readwrite");
  const store = tx.objectStore("moments");
  store.get(id).onsuccess = e => {
    const item = e.target.result;
    item.starred = !item.starred;
    store.put(item).onsuccess = () => renderGallery();
  };
}

function delMoment(id) {
  if (!confirm("Delete this moment?")) return;
  db.transaction("moments","readwrite").objectStore("moments").delete(id).onsuccess = renderGallery;
}

document.getElementById('up').onchange = e => {
  const f = e.target.files[0];
  if (f) saveMoment(f, f.type);
};

if ("serviceWorker" in navigator)
  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
</script>
</body>
</html>
